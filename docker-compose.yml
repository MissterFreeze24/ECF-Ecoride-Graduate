
services:
  php:
    build: ./docker/php
    volumes:
      - ./:/var/www
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ecoride
      MYSQL_USER: ecoride
      MYSQL_PASSWORD: ecoride

  nginx:
    image: nginx:1.27-alpine
    depends_on: [php]
    ports: ["8080:80"]
    volumes:
      - ./:/var/www
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: ecoride
      MARIADB_USER: ecoride
      MARIADB_PASSWORD: ecoride
      MARIADB_ROOT_PASSWORD: root
    ports: ["3307:3306"]
    volumes:
      - dbdata:/var/lib/mysql
      - ./conf/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  adminer:
    image: adminer:4
    ports: ["8081:8080"]

volumes:
  dbdata:
